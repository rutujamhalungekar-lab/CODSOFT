<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Tic-Tac-Toe AI</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', sans-serif;
    background: #0f0f1a;
    color: #e0e0ff;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    padding: 24px;
    max-width: 480px;
    width: 100%;
  }
  h1 {
    font-size: 1.8rem;
    font-weight: 700;
    letter-spacing: 2px;
    background: linear-gradient(135deg, #a78bfa, #60a5fa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .subtitle {
    font-size: 0.8rem;
    color: #6b7280;
    letter-spacing: 1px;
    text-transform: uppercase;
    text-align: center;
  }
  .settings {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .btn-group {
    display: flex;
    background: #1e1e30;
    border-radius: 10px;
    padding: 4px;
    gap: 4px;
    border: 1px solid #2d2d4a;
  }
  .btn-group button {
    padding: 6px 14px;
    border: none;
    border-radius: 7px;
    cursor: pointer;
    font-size: 0.8rem;
    font-weight: 600;
    letter-spacing: 0.5px;
    background: transparent;
    color: #6b7280;
    transition: all 0.2s;
  }
  .btn-group button.active {
    background: linear-gradient(135deg, #7c3aed, #3b82f6);
    color: white;
  }
  label {
    font-size: 0.75rem;
    color: #6b7280;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .status-bar {
    width: 100%;
    background: #1e1e30;
    border: 1px solid #2d2d4a;
    border-radius: 12px;
    padding: 12px 18px;
    text-align: center;
    font-size: 0.95rem;
    font-weight: 600;
    min-height: 46px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: all 0.3s;
  }
  .status-bar.win  { border-color: #10b981; color: #10b981; }
  .status-bar.lose { border-color: #ef4444; color: #ef4444; }
  .status-bar.draw { border-color: #f59e0b; color: #f59e0b; }
  .status-bar.thinking { border-color: #3b82f6; color: #3b82f6; }
  .board {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    width: 100%;
    max-width: 360px;
  }
  .cell {
    aspect-ratio: 1;
    background: #1e1e30;
    border: 2px solid #2d2d4a;
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2.6rem;
    font-weight: 900;
    cursor: pointer;
    transition: all 0.15s;
    user-select: none;
  }
  .cell:hover:not(.taken) {
    border-color: #7c3aed;
    background: #25253d;
    transform: scale(1.03);
  }
  .cell.taken { cursor: default; }
  .cell.X { color: #a78bfa; border-color: #6d28d9; }
  .cell.O { color: #60a5fa; border-color: #2563eb; }
  .cell.win-cell {
    background: linear-gradient(135deg, #1a1a3a, #1e2040);
    border-color: #f59e0b !important;
    animation: pulse 0.6s ease;
  }
  @keyframes pulse {
    0%   { transform: scale(1); }
    50%  { transform: scale(1.08); }
    100% { transform: scale(1); }
  }
  .cell.pop { animation: pop 0.2s ease; }
  @keyframes pop {
    0%   { transform: scale(0.6); opacity: 0.5; }
    100% { transform: scale(1);   opacity: 1; }
  }
  .scoreboard {
    display: flex;
    gap: 10px;
    width: 100%;
    max-width: 360px;
  }
  .score-card {
    flex: 1;
    background: #1e1e30;
    border: 1px solid #2d2d4a;
    border-radius: 10px;
    padding: 10px;
    text-align: center;
  }
  .score-card .label {
    font-size: 0.7rem;
    color: #6b7280;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .score-card .value {
    font-size: 1.6rem;
    font-weight: 800;
    margin-top: 2px;
  }
  .score-card.human .value { color: #a78bfa; }
  .score-card.ai    .value { color: #60a5fa; }
  .score-card.draws .value { color: #f59e0b; }
  .actions {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .btn {
    padding: 9px 22px;
    border: none;
    border-radius: 9px;
    cursor: pointer;
    font-size: 0.85rem;
    font-weight: 700;
    letter-spacing: 0.5px;
    transition: all 0.2s;
  }
  .btn-primary {
    background: linear-gradient(135deg, #7c3aed, #3b82f6);
    color: white;
  }
  .btn-primary:hover { opacity: 0.85; transform: translateY(-1px); }
  .btn-secondary {
    background: #1e1e30;
    color: #9ca3af;
    border: 1px solid #2d2d4a;
  }
  .btn-secondary:hover { color: #e0e0ff; border-color: #4b5563; }
  .algo-info strong { color: #a78bfa; }
  .nodes-explored { margin-top: 6px; font-size: 0.75rem; color: #4b5563; }
  .nodes-explored span { color: #60a5fa; font-weight: 700; }
</style>
</head>
<body>
<div class="container">
  <div>
    <h1>TIC-TAC-TOE</h1>
   <div class="subtitle">CODSOFT AI Internship Project</div>
  </div>

  <div class="settings">
    <div>
      <label style="margin-bottom:5px;display:block;">You play as</label>
      <div class="btn-group" id="sideGroup">
        <button class="active" onclick="setSide('X')">✕ X (First)</button>
        <button onclick="setSide('O')">◯ O (Second)</button>
      </div>
    </div>
    <div>
      <label style="margin-bottom:5px;display:block;">Difficulty</label>
      <div class="btn-group" id="diffGroup">
        <button onclick="setDiff('easy')">Easy</button>
        <button onclick="setDiff('medium')">Medium</button>
        <button class="active" onclick="setDiff('hard')">Hard</button>
      </div>
    </div>
  </div>

  <div class="status-bar" id="status">Your turn — click a cell to play</div>

  <div class="board" id="board"></div>

  <div class="scoreboard">
    <div class="score-card human">
      <div class="label">You</div>
      <div class="value" id="scoreHuman">0</div>
    </div>
    <div class="score-card draws">
      <div class="label">Draws</div>
      <div class="value" id="scoreDraws">0</div>
    </div>
    <div class="score-card ai">
      <div class="label">AI</div>
      <div class="value" id="scoreAI">0</div>
    </div>
  </div>

  <div class="actions">
    <button class="btn btn-primary" onclick="resetGame()">New Game</button>
    <button class="btn btn-secondary" onclick="resetScore()">Reset Score</button>
  </div>

  
</div>

<script>
  // ─── State ───────────────────────────────────────────────────────────────────
  let board = Array(9).fill(null);
  let humanMark = 'X';
  let aiMark    = 'O';
  let gameOver  = false;
  let difficulty = 'hard';
  let score = { human: 0, ai: 0, draws: 0 };
  let nodesExplored = 0;

  // All winning combinations (indices into the flat board array)
  const WINS = [
    [0,1,2],[3,4,5],[6,7,8],   // rows
    [0,3,6],[1,4,7],[2,5,8],   // cols
    [0,4,8],[2,4,6]            // diagonals
  ];

  // ─── Rendering ───────────────────────────────────────────────────────────────
  function renderBoard() {
    const b = document.getElementById('board');
    b.innerHTML = '';
    board.forEach((val, i) => {
      const cell = document.createElement('div');
      cell.className = 'cell' + (val ? ' taken ' + val : '');
      cell.textContent = val ? (val === 'X' ? '✕' : '◯') : '';
      cell.onclick = () => humanMove(i);
      b.appendChild(cell);
    });
  }

  function setStatus(msg, cls = '') {
    const s = document.getElementById('status');
    s.textContent = msg;
    s.className = 'status-bar ' + cls;
  }

  function highlightWin(cells) {
    const cellEls = document.querySelectorAll('.cell');
    cells.forEach(i => cellEls[i].classList.add('win-cell'));
  }

  function popCell(i) {
    document.querySelectorAll('.cell')[i].classList.add('pop');
  }

  // ─── Core Game Logic ─────────────────────────────────────────────────────────
  function checkWinner(b) {
    for (const [a, c, d] of WINS) {
      if (b[a] && b[a] === b[c] && b[a] === b[d])
        return { winner: b[a], line: [a, c, d] };
    }
    if (b.every(v => v)) return { winner: 'draw', line: [] };
    return null;
  }

  function humanMove(i) {
    if (gameOver || board[i]) return;
    board[i] = humanMark;
    renderBoard();
    popCell(i);
    const res = checkWinner(board);
    if (res) { endGame(res); return; }
    setStatus('AI is thinking...', 'thinking');
    setTimeout(aiMove, 300);
  }

  function aiMove() {
    nodesExplored = 0;
    let move;

    if (difficulty === 'easy') {
      // Random move
      const empty = board.map((v,i) => v ? null : i).filter(v => v !== null);
      move = empty[Math.floor(Math.random() * empty.length)];

    } else if (difficulty === 'medium') {
      // Win if possible, block human win, else random
      move = findWinOrBlock() ?? (() => {
        const empty = board.map((v,i) => v ? null : i).filter(v => v !== null);
        return empty[Math.floor(Math.random() * empty.length)];
      })();

    } else {
      // Full Minimax + Alpha-Beta
      move = getBestMove();
    }

    if (move == null) return;
    board[move] = aiMark;
    renderBoard();
    popCell(move);


    const res = checkWinner(board);
    if (res) { endGame(res); return; }
    setStatus('Your turn — click a cell to play');
  }

  // Medium difficulty helper: win or block, else null
  function findWinOrBlock() {
    for (const mark of [aiMark, humanMark]) {
      for (let i = 0; i < 9; i++) {
        if (!board[i]) {
          board[i] = mark;
          const res = checkWinner(board);
          board[i] = null;
          if (res && res.winner === mark) return i;
        }
      }
    }
    return null;
  }

  // ─── Minimax with Alpha-Beta Pruning ─────────────────────────────────────────
  //
  //  minimax(board, depth, isMaximizing, alpha, beta)
  //
  //  - depth   : how many moves deep we are (used to prefer faster wins)
  //  - isMax   : true  → AI's turn  (maximizer)
  //              false → Human turn (minimizer)
  //  - alpha   : best score the maximizer can guarantee so far
  //  - beta    : best score the minimizer can guarantee so far
  //
  //  Pruning: if beta <= alpha, the opponent will never let us reach this
  //  branch, so we stop exploring it entirely.
  //
  function minimax(b, depth, isMax, alpha, beta) {
    nodesExplored++;

    const res = checkWinner(b);
    if (res) {
      if (res.winner === aiMark)    return 10 - depth; // AI wins  (sooner = better)
      if (res.winner === humanMark) return depth - 10; // Human wins (delay loss)
      return 0;                                         // Draw
    }

    if (isMax) {
      // AI tries to MAXIMISE the score
      let best = -Infinity;
      for (let i = 0; i < 9; i++) {
        if (!b[i]) {
          b[i] = aiMark;
          best = Math.max(best, minimax(b, depth + 1, false, alpha, beta));
          b[i] = null;
          alpha = Math.max(alpha, best);
          if (beta <= alpha) break; // β-cutoff: minimizer won't allow this branch
        }
      }
      return best;
    } else {
      // Human tries to MINIMISE the score
      let best = Infinity;
      for (let i = 0; i < 9; i++) {
        if (!b[i]) {
          b[i] = humanMark;
          best = Math.min(best, minimax(b, depth + 1, true, alpha, beta));
          b[i] = null;
          beta = Math.min(beta, best);
          if (beta <= alpha) break; // α-cutoff: maximizer won't allow this branch
        }
      }
      return best;
    }
  }

  function getBestMove() {
    let bestVal = -Infinity, bestMove = -1;
    for (let i = 0; i < 9; i++) {
      if (!board[i]) {
        board[i] = aiMark;
        const val = minimax(board, 0, false, -Infinity, Infinity);
        board[i] = null;
        if (val > bestVal) { bestVal = val; bestMove = i; }
      }
    }
    return bestMove;
  }

  // ─── End Game ─────────────────────────────────────────────────────────────────
  function endGame(res) {
    gameOver = true;
    if (res.winner === 'draw') {
      score.draws++;
      setStatus("🤝 It's a draw!", 'draw');
    } else if (res.winner === humanMark) {
      score.human++;
      setStatus('🎉 You win! Amazing!', 'win');
      highlightWin(res.line);
    } else {
      score.ai++;
      setStatus('🤖 AI wins! Try again?', 'lose');
      highlightWin(res.line);
    }
    updateScore();
  }

  function updateScore() {
    document.getElementById('scoreHuman').textContent = score.human;
    document.getElementById('scoreAI').textContent    = score.ai;
    document.getElementById('scoreDraws').textContent = score.draws;
  }

  // ─── Controls ─────────────────────────────────────────────────────────────────
  function resetGame() {
    board    = Array(9).fill(null);
    gameOver = false;
    renderBoard();
    if (humanMark === 'O') {
      setStatus('AI goes first...', 'thinking');
      setTimeout(aiMove, 500);
    } else {
      setStatus('Your turn — click a cell to play');
    }
  }

  function resetScore() {
    score = { human: 0, ai: 0, draws: 0 };
    updateScore();
  }

  function setSide(s) {
    humanMark = s;
    aiMark    = s === 'X' ? 'O' : 'X';
    document.querySelectorAll('#sideGroup button').forEach((b, i) => {
      b.classList.toggle('active', (i === 0 && s === 'X') || (i === 1 && s === 'O'));
    });
    resetGame();
  }

 function setDiff(d) {
  difficulty = d;

  document.querySelectorAll('#diffGroup button').forEach((b, i) => {
    b.classList.toggle('active',
      ['easy','medium','hard'][i] === d
    );
  });

  resetGame();
}

  // ─── Init ─────────────────────────────────────────────────────────────────────
  resetGame();
</script>
</body>
</html>
